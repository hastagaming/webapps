name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Read cache version
        id: cacheversion
        run: echo "version=$(cat .github/cache-version.txt)" >> "$GITHUB_OUTPUT"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v${{ steps.cacheversion.outputs.version }}-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-v${{ steps.cacheversion.outputs.version }}-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean Gradle build (avoid stale KSP cache)
        run: ./gradlew clean --no-build-cache

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapps-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Bump cache version on failure
        if: failure()
        run: |
          CURRENT=$(cat .github/cache-version.txt)
          NEW=$((CURRENT + 1))
          echo "$NEW" > .github/cache-version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/cache-version.txt
          git commit -m "chore: bump gradle cache version to v$NEW (auto, build failed)"
          git push https://x-access-token:${{ secrets.AUTO_TAG_PAT }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}