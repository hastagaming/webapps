name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sign-and-release:
    name: Sign APK and Publish Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Download unsigned APK from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: android-ci.yml
          name: webapps-unsigned-apk
          path: ./unsigned-apk
          search_artifacts: true

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/zipalign -v 4 \
            ./unsigned-apk/app-release-unsigned.apk \
            ./unsigned-apk/app-release-aligned.apk

      - name: Sign APK with apksigner
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks release-keystore.jks \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --ks-pass pass:"$SIGNING_STORE_PASSWORD" \
            --key-pass pass:"$SIGNING_KEY_PASSWORD" \
            --out ./unsigned-apk/app-release-signed.apk \
            ./unsigned-apk/app-release-aligned.apk

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify \
            -v ./unsigned-apk/app-release-signed.apk

      - name: Rename APK with tag name
        run: |
          TAG_NAME="${{ github.ref_name }}"
          mv ./unsigned-apk/app-release-signed.apk "./unsigned-apk/WebApps-${TAG_NAME}.apk"

      - name: Remove keystore file
        if: always()
        run: rm -f release-keystore.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./unsigned-apk/WebApps-*.apk
          generate_release_notes: true