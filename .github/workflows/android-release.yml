name: Android Release

on:
  workflow_run:
    workflows: ["Android CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  check-and-sign:
    name: Sign APK and Publish Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine tag for this commit
        id: get_tag
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No version tag found on this commit. Skipping release."
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "Found tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.get_tag.outputs.tag != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Download unsigned APK from CI
        if: steps.get_tag.outputs.tag != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: android-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: webapps-unsigned-apk
          path: ./unsigned-apk

      - name: Decode signing keystore
        if: steps.get_tag.outputs.tag != ''
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Zipalign, Sign, and Rename all APKs
        if: steps.get_tag.outputs.tag != ''
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"

          for APK in ./unsigned-apk/*-unsigned.apk; do
            BASENAME=$(basename "$APK" -unsigned.apk)

            case "$BASENAME" in
              *armeabi-v7a*) SUFFIX="arm32" ;;
              *arm64-v8a*) SUFFIX="arm64" ;;
              *x86_64*) SUFFIX="x86_64" ;;
              *) SUFFIX="universal" ;;
            esac

            ALIGNED="./unsigned-apk/${BASENAME}-aligned.apk"
            SIGNED="./unsigned-apk/WebApps-${TAG}-${SUFFIX}.apk"

            $ANDROID_HOME/build-tools/35.0.0/zipalign -v 4 "$APK" "$ALIGNED"

            $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
              --ks release-keystore.jks \
              --ks-key-alias "$SIGNING_KEY_ALIAS" \
              --ks-pass pass:"$SIGNING_STORE_PASSWORD" \
              --key-pass pass:"$SIGNING_KEY_PASSWORD" \
              --out "$SIGNED" \
              "$ALIGNED"

            $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v "$SIGNED"

            echo "Signed: $SIGNED"
          done

      - name: Remove keystore file
        if: always()
        run: rm -f release-keystore.jks

      - name: Create GitHub Release
        if: steps.get_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: ./unsigned-apk/WebApps-*.apk
          generate_release_notes: true