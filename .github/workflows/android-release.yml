name: Android Release

on:
  workflow_run:
    workflows: ["Android CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  check-and-sign:
    name: Sign APK and Publish Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine tag for this commit
        id: get_tag
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No version tag found on this commit. Skipping release."
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "Found tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.get_tag.outputs.tag != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Download unsigned APK from CI
        if: steps.get_tag.outputs.tag != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: android-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: webapps-unsigned-apk
          path: ./unsigned-apk

      - name: Decode signing keystore
        if: steps.get_tag.outputs.tag != ''
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Zipalign APK
        if: steps.get_tag.outputs.tag != ''
        run: |
          $ANDROID_HOME/build-tools/35.0.0/zipalign -v 4 \
            ./unsigned-apk/app-release-unsigned.apk \
            ./unsigned-apk/app-release-aligned.apk

      - name: Sign APK with apksigner
        if: steps.get_tag.outputs.tag != ''
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks release-keystore.jks \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --ks-pass pass:"$SIGNING_STORE_PASSWORD" \
            --key-pass pass:"$SIGNING_KEY_PASSWORD" \
            --out ./unsigned-apk/app-release-signed.apk \
            ./unsigned-apk/app-release-aligned.apk

      - name: Verify APK signature
        if: steps.get_tag.outputs.tag != ''
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify \
            -v ./unsigned-apk/app-release-signed.apk

      - name: Rename APK with tag name
        if: steps.get_tag.outputs.tag != ''
        run: |
          mv ./unsigned-apk/app-release-signed.apk "./unsigned-apk/WebApps-${{ steps.get_tag.outputs.tag }}.apk"

      - name: Remove keystore file
        if: always()
        run: rm -f release-keystore.jks

      - name: Create GitHub Release
        if: steps.get_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: ./unsigned-apk/WebApps-*.apk
          generate_release_notes: true